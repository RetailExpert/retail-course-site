<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Verification | Ultimate Black Book</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background: #000000; color: #F5F5F5; line-height: 1.7; min-height: 100vh; }
    header { background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%); color: white; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2); border-bottom: 3px solid #FFD700; }
    header h1 { margin: 0; font-size: 24px; font-weight: 900; color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
    nav a { color: #FFD700; margin-left: 25px; text-decoration: none; font-weight: 600; transition: opacity 0.3s ease; }
    nav a:hover { opacity: 0.7; }

    .page-wrap { max-width: 700px; margin: 60px auto; padding: 0 20px 60px; text-align: center; }

    /* ── VALID state ── */
    .verify-card { background: #0a0a0a; border-radius: 24px; padding: 50px 40px; border: 3px solid #FFD700; box-shadow: 0 0 60px rgba(255, 215, 0, 0.15); }
    .badge { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #FFD700, #FFA500); display: flex; align-items: center; justify-content: center; font-size: 3em; margin: 0 auto 30px; box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4); }
    .verified-label { color: #48bb78; font-size: 1em; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
    .verify-title { font-family: 'Playfair Display', serif; color: #FFD700; font-size: 2.2em; font-weight: 900; margin-bottom: 8px; }
    .verify-subtitle { color: #B0B0B0; font-size: 1.05em; margin-bottom: 40px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; text-align: left; }
    .detail-item { background: #1a1a1a; border-radius: 12px; padding: 18px 22px; border: 1px solid rgba(255, 215, 0, 0.2); }
    .detail-label { color: #888; font-size: 0.78em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .detail-value { color: #F5F5F5; font-size: 1.05em; font-weight: 600; word-break: break-word; }
    .detail-value.gold { color: #FFD700; }
    .course-badge { background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,165,0,0.1)); border: 2px solid #FFD700; border-radius: 12px; padding: 20px 25px; margin: 30px 0; }
    .course-badge p { margin: 0; color: #F5F5F5; font-size: 1.05em; }
    .course-badge strong { color: #FFD700; }
    .divider { border: none; border-top: 1px solid rgba(255,215,0,0.2); margin: 30px 0; }
    .footer-note { color: #666; font-size: 0.85em; }

    /* ── INVALID state ── */
    .invalid-card { background: #0a0a0a; border-radius: 24px; padding: 50px 40px; border: 3px solid #ef4444; box-shadow: 0 0 60px rgba(239, 68, 68, 0.15); }
    .invalid-badge { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #ef4444, #b91c1c); display: flex; align-items: center; justify-content: center; font-size: 3em; margin: 0 auto 30px; }
    .invalid-title { color: #ef4444; font-size: 2em; font-weight: 900; margin-bottom: 10px; }
    .invalid-sub { color: #B0B0B0; font-size: 1.05em; }

    .btn { display: inline-block; background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); color: #000; padding: 16px 40px; text-decoration: none; border-radius: 50px; margin: 20px 10px 0; font-weight: 900; font-size: 1.1em; transition: all 0.3s; box-shadow: 0 8px 30px rgba(255,215,0,0.3); }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(255,215,0,0.5); }

    @media (max-width: 600px) {
      header { flex-direction: column; gap: 12px; padding: 16px 20px; }
      header h1 { font-size: 18px; }
      nav { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
      nav a { margin-left: 0; }
      .page-wrap { margin: 30px auto; }
      .verify-card, .invalid-card { padding: 35px 22px; }
      .verify-title { font-size: 1.6em; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <h1>⚫ THE ULTIMATE BLACK BOOK ⚫</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </header>

  <div class="page-wrap" id="pageWrap">
    <!-- Content injected by JS -->
  </div>

  <script>
    function getParam(name) {
      var params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function formatDate(isoString) {
      try {
        var d = new Date(isoString);
        if (isNaN(d.getTime())) return isoString;
        return d.toLocaleDateString('en-ZA', { year:'numeric', month:'long', day:'numeric' });
      } catch(e) { return isoString; }
    }

    function renderValid(name, cert, date) {
      var formattedDate = formatDate(date);
      var wrap = document.getElementById('pageWrap');
      wrap.innerHTML =
        '<div class="verify-card">' +
          '<div class="badge">🏆</div>' +
          '<div class="verified-label">✅ Certificate Verified</div>' +
          '<div class="verify-title">Authentic Certificate</div>' +
          '<div class="verify-subtitle">This certificate has been verified as genuine by The Ultimate Black Book Academy.</div>' +
          '<div class="detail-grid">' +
            '<div class="detail-item"><div class="detail-label">Certificate Holder</div><div class="detail-value gold">' + escHtml(name) + '</div></div>' +
            '<div class="detail-item"><div class="detail-label">Certificate Number</div><div class="detail-value">' + escHtml(cert) + '</div></div>' +
            '<div class="detail-item"><div class="detail-label">Date Completed</div><div class="detail-value">' + escHtml(formattedDate) + '</div></div>' +
            '<div class="detail-item"><div class="detail-label">Issued By</div><div class="detail-value">Ultimate Black Book Academy</div></div>' +
          '</div>' +
          '<div class="course-badge">' +
            '<p><strong>Course Completed:</strong><br>The Ultimate Black Book For Mastering Retail — Retail Excellence &amp; Legendary Customer Service</p>' +
            '<p style="margin-top:10px;font-size:0.9em;color:#B0B0B0;">8 modules covering visual merchandising, sales psychology, omnichannel retail, campaign execution, customer service mastery, stress management, cultural awareness &amp; professional growth.</p>' +
          '</div>' +
          '<hr class="divider">' +
          '<p class="footer-note">This verification page confirms the authenticity of the above certificate.<br>For enquiries contact us via <a href="index.html#contact" style="color:#FFD700;">our website</a>.</p>' +
          '<a href="index.html" class="btn">← Visit Our Website</a>' +
        '</div>';
    }

    function renderInvalid() {
      var wrap = document.getElementById('pageWrap');
      wrap.innerHTML =
        '<div class="invalid-card">' +
          '<div class="invalid-badge">❌</div>' +
          '<div class="invalid-title">Certificate Not Found</div>' +
          '<div class="invalid-sub">We could not verify this certificate. The link may be incomplete, expired, or invalid.<br><br>If you believe this is an error, please contact us via the course website.</div>' +
          '<a href="index.html" class="btn" style="margin-top:30px;">← Visit Our Website</a>' +
        '</div>';
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Main logic ──
    var cert = getParam('cert');
    var name = getParam('name');
    var date = getParam('date');

    // All three params must be present and cert must start with UBB-
    if (cert && name && date && /^UBB-[A-Z0-9]+$/.test(cert)) {
      renderValid(name, cert, date);
    } else {
      renderInvalid();
    }
  </script>

</body>
</html>
