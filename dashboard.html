<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetailExpert — Analytics Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
  
  .header { background: #111; border-bottom: 1px solid #d4af37; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 1.1rem; font-weight: 900; color: #d4af37; letter-spacing: .05em; }
  .live-badge { background: #1a3a1a; color: #4caf50; font-size: .7rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; border: 1px solid #4caf50; display: flex; align-items: center; gap: 6px; }
  .dot { width: 6px; height: 6px; background: #4caf50; border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .gate { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0a0a0a; }
  .gate-box { background: #111; border: 1px solid #d4af37; border-radius: 16px; padding: 40px; text-align: center; max-width: 360px; width: 90%; }
  .gate-box h2 { color: #d4af37; margin-bottom: 8px; }
  .gate-box p { color: #888; font-size: .9rem; margin-bottom: 24px; }
  .gate-input { width: 100%; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 1rem; margin-bottom: 12px; }
  .gate-btn { width: 100%; padding: 12px; background: #d4af37; color: #000; font-weight: 800; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }

  .dashboard { display: none; padding: 24px; max-width: 900px; margin: 0 auto; }
  
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; text-align: center; }
  .stat-card.gold { border-color: rgba(212,175,55,.4); }
  .stat-number { font-size: 2.8rem; font-weight: 900; color: #d4af37; line-height: 1; }
  .stat-label { font-size: .8rem; color: #888; margin-top: 8px; text-transform: uppercase; letter-spacing: .1em; }

  .section { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .section h3 { color: #d4af37; font-size: .85rem; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 20px; }

  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .bar-label { width: 120px; font-size: .85rem; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .bar-track { flex: 1; background: #1a1a1a; border-radius: 4px; height: 8px; }
  .bar-fill { height: 8px; border-radius: 4px; background: linear-gradient(90deg, #d4af37, #8a6820); transition: width .8s ease; }
  .bar-count { width: 30px; text-align: right; font-size: .85rem; color: #888; }

  .event-list { max-height: 300px; overflow-y: auto; }
  .event-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
  .event-item:last-child { border-bottom: none; }
  .event-type { font-size: .85rem; }
  .event-type.visit { color: #4caf50; }
  .event-type.payment_click { color: #d4af37; }
  .event-ref { font-size: .75rem; color: #666; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .event-time { font-size: .75rem; color: #555; }

  .refresh-btn { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: .8rem; float: right; }
  .refresh-btn:hover { color: #d4af37; border-color: #d4af37; }

  .empty { text-align: center; color: #555; padding: 40px; font-size: .9rem; }
</style>
</head>
<body>

<!-- Password Gate -->
<div id="gate" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;">
  <div class="gate-box">
    <h2>🔐 Dashboard Access</h2>
    <p>RetailExpert Analytics — Private</p>
    <input type="password" class="gate-input" id="dashPass" placeholder="Enter dashboard password" onkeydown="if(event.key==='Enter')unlock()">
    <button class="gate-btn" onclick="unlock()">Access Dashboard</button>
  </div>
</div>

<!-- Dashboard -->
<div id="app" style="display:none">
  <div class="header">
    <div class="logo">📊 RetailExpert Analytics</div>
    <div class="live-badge"><span class="dot"></span> LIVE</div>
  </div>

  <div class="dashboard">
    <div class="stats-grid">
      <div class="stat-card gold">
        <div class="stat-number" id="totalVisits">—</div>
        <div class="stat-label">Total Visits</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-number" id="totalClicks">—</div>
        <div class="stat-label">Payment Button Clicks</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-number" id="convRate">—</div>
        <div class="stat-label">Click Rate</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-number" id="todayVisits">—</div>
        <div class="stat-label">Visits Today</div>
      </div>
    </div>

    <div class="section">
      <h3>Traffic Sources <button class="refresh-btn" onclick="loadData()">↻ Refresh</button></h3>
      <div id="sourceChart"><div class="empty">Loading...</div></div>
    </div>

    <div class="section">
      <h3>Recent Events</h3>
      <div class="event-list" id="eventList"><div class="empty">Loading...</div></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://mkoblrxtitrvxwsfubjd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_DaJiN_25cKFyc-h39Z219g_ZKScPaMN';
const DASH_PASSWORD = 'Admin@RetailExpert2024';

function unlock() {
  const pass = document.getElementById('dashPass').value;
  if (pass === DASH_PASSWORD) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  } else {
    alert('Incorrect password');
  }
}

async function fetchEvents() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/page_events?select=*&order=created_at.desc&limit=500`, {
    headers: { 
      'apikey': SUPABASE_KEY, 
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json'
    }
  });
  const text = await res.text();
  console.log('Supabase fetch:', res.status, text.substring(0, 200));
  try { return JSON.parse(text); } 
  catch(e) { console.error('Parse error:', e); return []; }
}

function parseSource(referrer) {
  if (!referrer || referrer === 'direct') return 'Direct';
  if (referrer.includes('linkedin')) return 'LinkedIn';
  if (referrer.includes('instagram') || referrer.includes('ig')) return 'Instagram';
  if (referrer.includes('facebook') || referrer.includes('fb')) return 'Facebook';
  if (referrer.includes('whatsapp')) return 'WhatsApp';
  if (referrer.includes('google')) return 'Google';
  try { return new URL(referrer).hostname.replace('www.', ''); } 
  catch { return referrer.substring(0, 30); }
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs/24)}d ago`;
}

async function loadData() {
  try {
    const events = await fetchEvents();
    if (!Array.isArray(events)) return;

    const visits = events.filter(e => e.event_type === 'visit');
    const clicks = events.filter(e => e.event_type === 'payment_click');
    
    const today = new Date().toDateString();
    const todayVisits = visits.filter(e => new Date(e.created_at).toDateString() === today);

    document.getElementById('totalVisits').textContent = visits.length;
    document.getElementById('totalClicks').textContent = clicks.length;
    document.getElementById('convRate').textContent = visits.length ? Math.round((clicks.length / visits.length) * 100) + '%' : '0%';
    document.getElementById('todayVisits').textContent = todayVisits.length;

    // Source breakdown
    const sources = {};
    visits.forEach(e => {
      const src = parseSource(e.referrer);
      sources[src] = (sources[src] || 0) + 1;
    });
    const sorted = Object.entries(sources).sort((a,b) => b[1]-a[1]);
    const maxVal = sorted[0]?.[1] || 1;
    
    const chartHtml = sorted.length ? sorted.map(([src, count]) => `
      <div class="bar-row">
        <div class="bar-label">${src}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(count/maxVal)*100}%"></div></div>
        <div class="bar-count">${count}</div>
      </div>
    `).join('') : '<div class="empty">No visits tracked yet</div>';
    document.getElementById('sourceChart').innerHTML = chartHtml;

    // Recent events
    const recentHtml = events.slice(0, 50).length ? events.slice(0, 50).map(e => `
      <div class="event-item">
        <span class="event-type ${e.event_type}">${e.event_type === 'visit' ? '👁 Visit' : '💰 Payment Click'}</span>
        <span class="event-ref">${parseSource(e.referrer)}</span>
        <span class="event-time">${timeAgo(e.created_at)}</span>
      </div>
    `).join('') : '<div class="empty">No events yet — share your link!</div>';
    document.getElementById('eventList').innerHTML = recentHtml;

  } catch(err) {
    console.error(err);
  }
}

// Auto refresh every 60 seconds
setInterval(() => {
  if (document.getElementById('app').style.display !== 'none') loadData();
}, 60000);
</script>
</body>
</html>
