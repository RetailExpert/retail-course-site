
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetailExpert Analytics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; }

#gate { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.gate-box { background: #111; border: 2px solid #d4af37; border-radius: 16px; padding: 40px; text-align: center; width: 90%; max-width: 360px; }
.gate-box h2 { color: #d4af37; margin-bottom: 8px; font-size: 1.4rem; }
.gate-box p { color: #888; font-size: .9rem; margin-bottom: 24px; }
input[type=password] { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 1rem; margin-bottom: 12px; }
.btn { width: 100%; padding: 12px; background: #d4af37; color: #000; font-weight: 800; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }

#app { display: none; }
.header { background: #111; border-bottom: 2px solid #d4af37; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
.logo { color: #d4af37; font-weight: 900; font-size: 1rem; }
.live { background: #1a3a1a; color: #4caf50; font-size: .7rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; border: 1px solid #4caf50; }

.content { padding: 20px; max-width: 900px; margin: 0 auto; }

.stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
.stat { background: #111; border: 1px solid #d4af37; border-radius: 12px; padding: 20px; text-align: center; }
.stat-num { font-size: 2.5rem; font-weight: 900; color: #d4af37; }
.stat-lbl { font-size: .75rem; color: #888; margin-top: 6px; text-transform: uppercase; letter-spacing: .1em; }

.section { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.section h3 { color: #d4af37; font-size: .8rem; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 16px; }

.event { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a1a1a; font-size: .85rem; }
.event:last-child { border: none; }
.visit { color: #4caf50; }
.payment_click { color: #d4af37; }
.ref { color: #666; font-size: .75rem; }
.time { color: #555; font-size: .75rem; }

.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.bar-lbl { width: 100px; font-size: .8rem; color: #ccc; }
.bar-track { flex: 1; background: #1a1a1a; border-radius: 4px; height: 8px; }
.bar-fill { height: 8px; border-radius: 4px; background: #d4af37; }
.bar-cnt { width: 25px; text-align: right; font-size: .8rem; color: #888; }

#status { color: #f00; font-size: .8rem; padding: 10px; text-align: center; }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <h2>🔐 Dashboard</h2>
    <p>RetailExpert Analytics — Private</p>
    <input type="password" id="pw" placeholder="Password" />
    <button class="btn" onclick="unlock()">Enter</button>
    <div id="status"></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="logo">📊 RetailExpert Analytics</div>
    <div class="live">● LIVE</div>
  </div>
  <div class="content">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="sVisits">…</div><div class="stat-lbl">Total Visits</div></div>
      <div class="stat"><div class="stat-num" id="sClicks">…</div><div class="stat-lbl">Buy Clicks</div></div>
      <div class="stat"><div class="stat-num" id="sRate">…</div><div class="stat-lbl">Click Rate</div></div>
      <div class="stat"><div class="stat-num" id="sToday">…</div><div class="stat-lbl">Today</div></div>
    </div>
    <div class="section">
      <h3>Traffic Sources</h3>
      <div id="sources">Loading…</div>
    </div>
    <div class="section">
      <h3>Recent Events</h3>
      <div id="events">Loading…</div>
    </div>
  </div>
</div>

<script>
function unlock() {
  var pw = document.getElementById('pw').value;
  if (pw === 'Admin@RetailExpert2024') {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  } else {
    document.getElementById('status').textContent = 'Wrong password';
  }
}

document.getElementById('pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') unlock();
});

function src(referrer) {
  if (!referrer || referrer === 'direct') return 'Direct';
  if (referrer.includes('linkedin')) return 'LinkedIn';
  if (referrer.includes('instagram') || referrer.includes('ig')) return 'Instagram';
  if (referrer.includes('facebook') || referrer.includes('fb')) return 'Facebook';
  if (referrer.includes('whatsapp')) return 'WhatsApp';
  if (referrer.includes('google')) return 'Google';
  try { return new URL(referrer).hostname.replace('www.', ''); } catch(e) { return 'Other'; }
}

function ago(d) {
  var m = Math.floor((Date.now() - new Date(d)) / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  var h = Math.floor(m/60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h/24) + 'd ago';
}

async function loadData() {
  try {
    var res = await fetch('/.netlify/functions/track');
    var data = await res.json();

    if (!Array.isArray(data)) {
      document.getElementById('events').innerHTML = '<div style="color:red">Error: ' + JSON.stringify(data) + '</div>';
      return;
    }

    var visits = data.filter(function(e) { return e.event_type === 'visit'; });
    var clicks = data.filter(function(e) { return e.event_type === 'payment_click'; });
    var today = new Date().toDateString();
    var todayV = visits.filter(function(e) { return new Date(e.created_at).toDateString() === today; });

    document.getElementById('sVisits').textContent = visits.length;
    document.getElementById('sClicks').textContent = clicks.length;
    document.getElementById('sRate').textContent = visits.length ? Math.round(clicks.length/visits.length*100) + '%' : '0%';
    document.getElementById('sToday').textContent = todayV.length;

    // Sources
    var sources = {};
    visits.forEach(function(e) { var s = src(e.referrer); sources[s] = (sources[s]||0)+1; });
    var sorted = Object.entries(sources).sort(function(a,b){return b[1]-a[1];});
    var max = sorted[0] ? sorted[0][1] : 1;
    document.getElementById('sources').innerHTML = sorted.length ? sorted.map(function(x) {
      return '<div class="bar-row"><div class="bar-lbl">' + x[0] + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (x[1]/max*100) + '%"></div></div><div class="bar-cnt">' + x[1] + '</div></div>';
    }).join('') : '<div style="color:#555;text-align:center;padding:20px">No data yet</div>';

    // Events
    document.getElementById('events').innerHTML = data.slice(0,30).map(function(e) {
      return '<div class="event"><span class="' + e.event_type + '">' + (e.event_type === 'visit' ? '👁 Visit' : '💰 Buy Click') + '</span><span class="ref">' + src(e.referrer) + '</span><span class="time">' + ago(e.created_at) + '</span></div>';
    }).join('');

  } catch(err) {
    document.getElementById('events').innerHTML = '<div style="color:red">Failed: ' + err.message + '</div>';
  }
}

setInterval(function() {
  if (document.getElementById('app').style.display !== 'none') loadData();
}, 60000);
</script>
</body>
</html>
